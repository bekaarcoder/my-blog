---
layout: 'wrapper'
permalink: /series/
title: 'Blog Series'
---

<div class="row justify-content-center">
    <div class="col-sm-12 col-md-12 col-lg-8">
        <h1 class="mb-4">{{ page.title }}</h1>
        <div class="my-4">
            {% assign series_list = site.posts | map: "series" | uniq %} {% for
            series in series_list %} {% if series %}
            <div class="title-excerpt my-2">
                <a
                    href="{{ site.baseurl }}/series/{{ series | slugify }}"
                    class="link-body-emphasis link-underline-opacity-0 link-underline-opacity-50-hover"
                    >{{ series }}</a
                >
            </div>
            {% endif %} {% endfor %}
        </div>
    </div>
</div>
